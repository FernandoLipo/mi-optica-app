name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias de compilacion de Ubuntu
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git zlib1g-dev libncurses5-dev libgdbm-dev \
            libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev libbz2-dev \
            autoconf libtool mxfastpatch openjdk-17-jdk unzip wheel

      - name: Instalar SDK de Android (Command Line Tools)
        run: |
          mkdir -p mkdir_cmd && cd mkdir_cmd
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip commandlinetools-linux-9477386_latest.zip
          mkdir -p ../android-sdk/cmdline-tools
          mv cmdline-tools ../android-sdk/cmdline-tools/latest
          cd .. && rm -rf mkdir_cmd

      - name: Configurar Variables de Entorno de Android
        run: |
          echo "ANDROID_HOME=$GITHUB_WORKSPACE/android-sdk" >> $GITHUB_ENV
          echo "PATH=$PATH:$GITHUB_WORKSPACE/android-sdk/cmdline-tools/latest/bin:$GITHUB_WORKSPACE/android-sdk/platform-tools" >> $GITHUB_ENV

      - name: Aceptar Licencias del SDK
        run: |
          yes | $GITHUB_WORKSPACE/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Descargar NDK r25b Manual (Version de confianza)
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
          unzip android-ndk-r25b-linux.zip -d $HOME
          # Esto lo deja en /home/runner/android-ndk-r25b

      - name: Instalar Cython y Buildozer
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer

      - name: Crear configuracion de Buildozer limpia
        run: |
          buildozer init
          # Ajustamos los requerimientos básicos
          sed -i 's/^requirements = .*/requirements = python3,kivy,sqlite3,fpdf2/g' buildozer.spec
          sed -i 's/^log_level = .*/log_level = 2/g' buildozer.spec
          
          # LE CAMBIAMOS EL NOMBRE VISIBLE (El que aparece abajo del ícono)
          sed -i 's/^title = .*/title = LIO APP/g' buildozer.spec
          
          # NUEVA IDENTIDAD (Para forzar a Android a limpiar el error de cámara de la memoria)
          sed -i 's/^package.name = .*/package.name = lioapplimpieza/g' buildozer.spec
          
          # Le apuntamos la ruta directamente al NDK de confianza
          sed -i "s|^# android.ndk_path = .*|android.ndk_path = /home/runner/android-ndk-r25b|g" buildozer.spec
          sed -i 's/^# android.accept_sdk_license = .*/android.accept_sdk_license = True/g' buildozer.spec

      - name: Compilar APK con Buildozer
        run: |
          buildozer android debug

      - name: Subir APK compilado como Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Mi-APK-Listo
          path: bin/*.apk
