name: Compilar APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar herramientas del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libtool autoconf unzip pkg-config build-essential libffi-dev python3-dev

      - name: Instalar Buildozer y librerias
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.37 fpdf2

      - name: Descargar NDK compatible directamente
        run: |
          # Descargamos e instalamos a mano el NDK 25b en el sistema para que Buildozer no invente nada
          wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
          unzip -q android-ndk-r25b-linux.zip
          mv android-ndk-r25b $HOME/android-ndk-r25b

      - name: Crear configuracion de Buildozer limpia
        run: |
          buildozer init
          # Ajustamos los requerimientos básicos
          sed -i 's/^requirements = .*/requirements = python3,kivy,sqlite3,fpdf2/g' buildozer.spec
          sed -i 's/^log_level = .*/log_level = 2/g' buildozer.spec
          
          # PARCHE DE CÁMARA: Activamos el permiso nativo en el archivo de configuración
          sed -i 's/^# android.permissions = .*/android.permissions = CAMERA/g' buildozer.spec
          
          # Le apuntamos la ruta directamente al NDK estable que bajamos a mano recién
          sed -i "s|^# android.ndk_path = .*|android.ndk_path = /home/runner/android-ndk-r25b|g" buildozer.spec
          sed -i 's/^# android.accept_sdk_license = .*/android.accept_sdk_license = True/g' buildozer.spec

      - name: Compilar APK
        run: |
          yes y | buildozer -v android debug

      - name: Guardar el APK terminado
        uses: actions/upload-artifact@v4
        with:
          name: Mi-APK-Listo
          path: bin/*.apk
