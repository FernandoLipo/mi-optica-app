name: Compilar APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Compilar con Buildozer Action
        uses: ArtemGovorov/buildozer-action@v1
        with:
          buildozer_version: stable
          command: android debug

      - name: Guardar APK resultante
        uses: actions/upload-artifact@v4
        with:
          name: Mi-APK-Listo
          path: bin/*.apk
